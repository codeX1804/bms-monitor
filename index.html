<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAT BMS - Universal BLE Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --accent-green: #00e676;
            --accent-blue: #00b0ff;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --border-color: #222e46;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            background-color: #0d1321;
            border-radius: 30px;
            border: 6px solid #2d3748;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 950px;
        }

        header {
            background-color: var(--card-bg);
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-scan {
            background: linear-gradient(135deg, #00b0ff, #00e676);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-scan:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-scan.connected {
            background: var(--accent-red);
            color: #fff;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .soc-card {
            background: radial-gradient(circle at top, #1e293b 0%, var(--card-bg) 100%);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .circle-outer {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-green) 0%, var(--border-color) 0%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background 0.5s ease;
        }

        .circle-inner {
            width: 122px;
            height: 122px;
            background-color: #0d1321;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }

        .soc-val {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .soc-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-badge {
            margin-top: 12px;
            background: rgba(255, 61, 0, 0.1);
            color: var(--accent-red);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 61, 0, 0.2);
            text-align: center;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .metric-icon {
            font-size: 1.3rem;
            color: var(--accent-blue);
            width: 30px;
            text-align: center;
        }

        .metric-details p:first-child {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .metric-details p:last-child {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .cells-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 15px;
        }

        .card-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .cell-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        .cell-row:last-child {
            margin-bottom: 0;
        }

        .cell-label {
            font-size: 0.8rem;
            width: 50px;
            color: var(--text-muted);
        }

        .cell-bar-bg {
            flex: 1;
            height: 8px;
            background-color: #222e46;
            border-radius: 4px;
            overflow: hidden;
        }

        .cell-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            width: 0%;
            transition: width 0.3s ease;
        }

        .cell-val {
            font-size: 0.85rem;
            font-weight: 700;
            width: 50px;
            text-align: right;
        }

        .controls-card {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .control-toggle {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .control-toggle.active {
            border-color: var(--accent-green);
            background: rgba(0, 230, 118, 0.05);
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background-color: #4b5563;
            border-radius: 12px;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .control-toggle.active .toggle-switch {
            background-color: var(--accent-green);
        }

        .control-toggle.active .toggle-switch::after {
            transform: translateX(20px);
        }

        .control-toggle span {
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* EXPANDED TERMINAL FOOTER PANEL */
        .console-card {
            background-color: #070a13;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid var(--border-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.78rem;
            height: 75px; /* Increased from 220px for full visibility */
            overflow-y: auto;
            color: #39ff14;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            flex-shrink: 0;
            
        }

        .console-line {
            margin-bottom: 6px;
            line-height: 1.3;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="phone-container">
    <header>
        <h1><i class="fa-solid fa-battery-three-quarters"></i> BAT BMS</h1>
        <button class="btn-scan" id="scanBtn" onclick="handleBluetoothConnection()">
            <i class="fa-solid fa-bluetooth" id="bluetoothIcon"></i> <span id="btnText">Scan All</span>
        </button>
    </header>

    <div class="content">
        <div class="soc-card">
            <div class="circle-outer" id="socProgress">
                <div class="circle-inner">
                    <span class="soc-val" id="socText">0%</span>
                    <span class="soc-lbl">S.O.C</span>
                </div>
            </div>
            <div class="status-badge" id="bmsStatus">Disconnected</div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon" style="color: var(--accent-green);"><i class="fa-solid fa-bolt"></i></div>
                <div class="metric-details">
                    <p>Total Voltage</p>
                    <p id="totalVolts">0.00 V</p>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="color: var(--accent-blue);"><i class="fa-solid fa-gauge-high"></i></div>
                <div class="metric-details">
                    <p>Current</p>
                    <p id="totalAmps">0.0 A</p>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="color: #e040fb;"><i class="fa-solid fa-plug"></i></div>
                <div class="metric-details">
                    <p>Power</p>
                    <p id="totalPower">0 W</p>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-icon" style="color: #ff9100;"><i class="fa-solid fa-temperature-half"></i></div>
                <div class="metric-details">
                    <p>Temp</p>
                    <p id="tempValue">0.0 °C</p>
                </div>
            </div>
        </div>

        <div class="cells-card">
            <div class="card-title">
                <span>Cell Monitoring (4S)</span>
                <span id="cellDelta">Diff: 0.000 V</span>
            </div>
            <div class="cell-row">
                <span class="cell-label">Cell 1</span>
                <div class="cell-bar-bg"><div class="cell-bar-fill" id="c1Bar"></div></div>
                <span class="cell-val" id="c1Val">0.000V</span>
            </div>
            <div class="cell-row">
                <span class="cell-label">Cell 2</span>
                <div class="cell-bar-bg"><div class="cell-bar-fill" id="c2Bar"></div></div>
                <span class="cell-val" id="c2Val">0.000V</span>
            </div>
            <div class="cell-row">
                <span class="cell-label">Cell 3</span>
                <div class="cell-bar-bg"><div class="cell-bar-fill" id="c3Bar"></div></div>
                <span class="cell-val" id="c3Val">0.000V</span>
            </div>
            <div class="cell-row">
                <span class="cell-label">Cell 4</span>
                <div class="cell-bar-bg"><div class="cell-bar-fill" id="c4Bar"></div></div>
                <span class="cell-val" id="c4Val">0.000V</span>
            </div>
        </div>

        <div class="controls-card">
            <div class="control-toggle" id="chargeToggle" onclick="sendControlCommand('charge')">
                <div class="toggle-switch"></div>
                <span>Charge MOS</span>
            </div>
            <div class="control-toggle" id="dischargeToggle" onclick="sendControlCommand('discharge')">
                <div class="toggle-switch"></div>
                <span>Discharge MOS</span>
            </div>
        </div>

        <!-- BIGGER, EXPANDED TERMINAL VIEW -->
        <div class="console-card" id="consoleLog">
            <div class="console-line">SYSTEM STATUS: Terminal Initialized. Ready to scan hardware layers...</div>
        </div>
    </div>
</div>

<script>
    let bluetoothDevice = null;
    let bmsCharacteristic = null;
    let bmsWriteCharacteristic = null;
    let isConnected = false;
    
    // Core BMS Target Service Profiles
    const KNOWN_BMS_SERVICES = [
        '0000ffe0-0000-1000-8000-00805f9b34fb', // JBD / Jiabaida Service 
        '0000fff0-0000-1000-8000-00805f9b34fb', // Daly BMS Service
        '0000ff00-0000-1000-8000-00805f9b34fb', // JK Active Balancing Module Service
        '0000180f-0000-1000-8000-00805f9b34fb'  // Generic GATT Battery Profile
    ];

    const consoleBox = document.getElementById('consoleLog');

    function logMessage(text) {
        const time = new Date().toLocaleTimeString();
        const line = document.createElement('div');
        line.className = 'console-line';
        line.innerText = `[${time}] ${text}`;
        consoleBox.appendChild(line);
        consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
        logMessage("SECURITY ERROR: Web Bluetooth requires an HTTPS environment. Run on live deployment server.");
    }

    async function handleBluetoothConnection() {
        if (!navigator.bluetooth) {
            logMessage("CRITICAL ERROR: Browser architecture lacks Web Bluetooth APIs.");
            alert("Please use mobile Google Chrome / Opera or transition your testing to an HTTPS URL layer.");
            return;
        }

        const btn = document.getElementById('scanBtn');
        const btnText = document.getElementById('btnText');

        if (!isConnected) {
            logMessage("Opening master scan window (acceptAllDevices = true)...");
            btnText.innerText = "Scanning...";
            btn.disabled = true;

            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                            filters: [
          { namePrefix: 'JBD' },
          { namePrefix: 'JK' },
          { namePrefix: 'DALY' },
          { namePrefix: 'DL' },
          { namePrefix: 'BLE' },
          { namePrefix: 'Smart' }
        ],
        optionalServices: KNOWN_BMS_SERVICES
      });


                logMessage(`Target paired: "${bluetoothDevice.name || 'Unnamed Peripheral'}"`);
                bluetoothDevice.addEventListener('gattserverdisconnected', onDeviceDisconnected);

                const server = await bluetoothDevice.gatt.connect();
                logMessage("GATT communication session opened successfully.");

                let structuralService = null;
                for (const uuid of KNOWN_BMS_SERVICES) {
                    try {
                        structuralService = await server.getPrimaryService(uuid);
                        logMessage(`Matched working profile registry: ${uuid}`);
                        break;
                    } catch (e) {
                        continue;
                    }
                }

                if (!structuralService) {
                    throw new Error("No matching primary battery telemetry descriptors exposed on target.");
                }

                logMessage("Parsing internal service registers for hardware pipes...");
                const characteristics = await structuralService.getCharacteristics();
                
                // Map the active I/O communication structures
                let rxChar = characteristics.find(c => c.properties.notify || c.properties.indicate);
                let txChar = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);
                
                // Adaptive Fallback mapping if target merges profiles into a single pipeline 
                if (!rxChar) rxChar = characteristics[0];
                if (!txChar) txChar = characteristics[0];

                bmsCharacteristic = rxChar;
                bmsWriteCharacteristic = txChar;

                // Fire up data notification parameters
                await rxChar.startNotifications();
                rxChar.addEventListener('characteristicvaluechanged', processHardwareTelemetryPacket);
                logMessage(`Bound notifications pipe to register: ${rxChar.uuid}`);

                // WAKE UP HANDSHAKE INSTRUCTION
                logMessage("Sending initialization query block sequence to device standard channels...");
                const queryCommand = new Uint8Array([0xDD, 0xA5, 0x03, 0x00, 0xFF, 0xFD, 0x77]); 
                
                await txChar.writeValue(queryCommand);
                logMessage("Wake sequence frame dispatched. Awaiting hardware processing response loops...");

                setUIConnected(bluetoothDevice.name || 'Smart BMS');
                
            } catch (error) {
                logMessage(`Connection Interface Drop: ${error.message}`);
                resetConnectionState();
            } finally {
                btn.disabled = false;
            }
        } else {
            logMessage("Manually halting current active GATT server pipelines.");
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            }
            resetConnectionState();
        }
    }

    function processHardwareTelemetryPacket(event) {
        const rawBuffer = event.target.value;
        logMessage(`Pipeline Raw Ingress Frame: ${rawBuffer.byteLength} bytes array loaded.`);

        try {
            if (rawBuffer.byteLength >= 8) {
                // Decode structural standard offsets
                let calculatedVolts = ((rawBuffer.getUint8(4) << 8) | rawBuffer.getUint8(5)) / 100;
                let calculatedAmps = (rawBuffer.getInt16(6)) / 100;
                let calculatedSOC = rawBuffer.getUint8(8) <= 100 ? rawBuffer.getUint8(8) : 0;

                updateDashboardUI(calculatedVolts, calculatedAmps, calculatedSOC);
            }
        } catch (err) {
            logMessage(`Telemetry Decoding Exception: ${err.message}`);
        }
    }

    function updateDashboardUI(volts, amps, soc) {
        document.getElementById('totalVolts').innerText = `${volts.toFixed(2)} V`;
        document.getElementById('totalAmps').innerText = `${amps.toFixed(1)} A`;
        document.getElementById('totalPower').innerText = `${(volts * amps).toFixed(0)} W`;
        document.getElementById('socText').innerText = `${soc}%`;
        document.getElementById('socProgress').style.background = `conic-gradient(var(--accent-green) ${soc}%, var(--border-color) ${soc}%)`;
    }

    async function sendControlCommand(action) {
        if (!isConnected || !bmsWriteCharacteristic) {
            logMessage("Instruction dropped: Active system session connection link missing.");
            return;
        }

        try {
            let directCommandBlock;
            if (action === 'charge') {
                logMessage("Assembling MOS Charge state frame change payload...");
                directCommandBlock = new Uint8Array([0xDD, 0x5A, 0xE1, 0x02, 0x00, 0x00, 0xFF, 0x00]); 
            } else if (action === 'discharge') {
                logMessage("Assembling MOS Discharge state frame change payload...");
                directCommandBlock = new Uint8Array([0xDD, 0x5A, 0xE1, 0x02, 0x00, 0x01, 0xFF, 0x00]); 
            }

            await bmsWriteCharacteristic.writeValue(directCommandBlock);
            logMessage(`Command frame successfully written to hardware register line.`);
        } catch (error) {
            logMessage(`Write pipeline structural fault: ${error.message}`);
        }
    }

    function onDeviceDisconnected() {
        logMessage("ALERT WARNING: Remote peripheral closed physical signal link or walked out of range limits.");
        resetConnectionState();
    }

    function setUIConnected(name) {
        isConnected = true;
        const btn = document.getElementById('scanBtn');
        const bmsStatus = document.getElementById('bmsStatus');
        
        btn.classList.add('connected');
        document.getElementById('btnText').innerText = "Disconnect";
        document.getElementById('bluetoothIcon').className = "fa-solid fa-link-slash";
        
        bmsStatus.innerText = `Connected: ${name}`;
        bmsStatus.style.background = "rgba(0, 230, 118, 0.1)";
        bmsStatus.style.color = "var(--accent-green)";
        bmsStatus.style.borderColor = "rgba(0, 230, 118, 0.2)";
    }

    function resetConnectionState() {
        isConnected = false;
        const btn = document.getElementById('scanBtn');
        const bmsStatus = document.getElementById('bmsStatus');
        
        btn.classList.remove('connected');
        document.getElementById('btnText').innerText = "Scan All";
        document.getElementById('bluetoothIcon').className = "fa-solid fa-bluetooth";
        
        bmsStatus.innerText = "Disconnected";
        bmsStatus.style.background = "rgba(255, 61, 0, 0.1)";
        bmsStatus.style.color = "var(--accent-red)";
        bmsStatus.style.borderColor = "rgba(255, 61, 0, 0.2)";
        
        clearDashboardUI();
    }

    function clearDashboardUI() {
        document.getElementById('totalVolts').innerText = "0.00 V";
        document.getElementById('totalAmps').innerText = "0.0 A";
        document.getElementById('totalPower').innerText = "0 W";
        document.getElementById('tempValue').innerText = "0.0 °C";
        document.getElementById('socText').innerText = "0%";
        document.getElementById('socProgress').style.background = `conic-gradient(var(--accent-green) 0%, var(--border-color) 0%)`;
        document.getElementById('cellDelta').innerText = "Diff: 0.000 V";
        ['c1', 'c2', 'c3', 'c4'].forEach(id => {
            document.getElementById(`${id}Val`).innerText = "0.000V";
            document.getElementById(`${id}Bar`).style.width = "0%";
        });
    }
</script>
</body>
</html>
